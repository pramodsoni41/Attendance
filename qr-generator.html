<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial;">

<h2 id="title">Admin Access Required</h2>

<canvas id="qr" style="display:none;"></canvas>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxzg-szei52PL9ZKWgwRZDnLLG-1K5ccMTYRYqKb9acZBemn034VmcDI6gSYHtnvz8/exec";

let SECRET = "";
let ADMIN_PASS = "";

/* ================= LOAD ADMIN PASSWORD ================= */
function loadAdminPass() {

  const script = document.createElement("script");

  script.src = `${API_URL}?type=get_admin_pass&callback=setAdminPass`;

  script.onerror = () => {
    alert("❌ Cannot connect to server");
  };

  document.body.appendChild(script);
}

function setAdminPass(data) {

  if (data.status === "success") {
    ADMIN_PASS = data.pass;
    askPassword();
  } else {
    alert("Cannot load admin config");
  }
}

/* ================= ASK PASSWORD ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {
    document.getElementById("title").innerText = "Dynamic QR (Secure)";
    document.getElementById("qr").style.display = "block";

    loadSecret();   // 🔥 continue only after correct password
  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized Access</h2>";
  }
}

/* ================= LOAD SECRET ================= */
function loadSecret() {

  const script = document.createElement("script");

  script.src = `${API_URL}?type=get_secret_key&callback=setSecret`;

  document.body.appendChild(script);
}

function setSecret(data) {

  if (data.status === "success") {
    SECRET = data.secret;
    startQR();
  } else {
    alert("Secret load failed");
  }
}

/* ================= HASH ================= */
async function sha256(str) {
  const buffer = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(str)
  );

  return Array.from(new Uint8Array(buffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/* ================= GENERATE QR ================= */
async function generateQR() {

  const session_id = "CE101";
  const timestamp = Date.now();
  const token = Math.random().toString(36).substring(2,8);

  const raw = session_id + "|" + timestamp + "|" + SECRET;
  const signature = await sha256(raw);

  const data = {
    session_id,
    timestamp,
    token,
    signature
  };

  QRCode.toCanvas(
    document.getElementById('qr'),
    JSON.stringify(data),
    {
      width: 600,
      margin: 2
    }
  );
}

/* ================= LOOP ================= */
function startQR() {
  generateQR();
  setInterval(generateQR, 15000);
}

/* ================= INIT ================= */
loadAdminPass();

</script>

</body>
</html>
