<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IIT BHU Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
  h2 { color: #1e3a8a; margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
  input:focus { border-color: #2563eb; outline: none; }
  button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1d4ed8; }
  #status { margin-top: 15px; font-weight: 600; min-height: 24px; font-size: 14px; }
  .hidden { display: none; }
  .instruction { color: #4b5563; font-size: 14px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="card">
  <h2>Attendance Portal</h2>
  
  <div id="formSection">
    <p class="instruction" id="instruction">Enter Roll Number to mark attendance</p>
    <input type="text" id="rollNo" placeholder="e.g. 21114001" autofocus>
    <button id="submitBtn" onclick="handleSubmission()">Submit Attendance</button>
  </div>

  <div id="status"></div>
</div>

<script>
// Replace with your latest Deployment Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbwVy7xCze35FgP8rPlr-E0XFKbutd77fjXYJU39GLR-eYUIY3wfruKkM568T5N3bu4/exec";

/* ================= UTILS ================= */
function byId(id) { return document.getElementById(id); }

function getUrlParams() { return new URLSearchParams(window.location.search); }

// Helper to parse the pipe-delimited QR string
function processPayload(raw) {
  if (!raw) return null;
  const parts = raw.split('|');
  if (parts.length < 4) return null;
  return {
    session_id: parts[0],
    timestamp: parts[1],
    token: parts[2],
    signature: parts[3]
  };
}

function jsonpRequest(url, callbackName, onSuccess) {
  const script = document.createElement("script");
  window[callbackName] = (data) => {
    script.remove();
    delete window[callbackName];
    onSuccess(data);
  };
  script.src = `${url}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = "DEV-" + Math.random().toString(36).substring(2, 10) + Date.now();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ================= CORE LOGIC ================= */
function handleSubmission() {
  const rollNo = byId("rollNo").value.trim();
  const payload = sessionStorage.getItem("pending_qr");
  const sTime = sessionStorage.getItem("scan_time");
  const statusDiv = byId("status");
  const btn = byId("submitBtn");

  if (!payload || !sTime) {
    statusDiv.innerHTML = "<span style='color:red'>❌ Error: No valid scan session found. Please re-scan.</span>";
    return;
  }

  if (!rollNo) {
    alert("Please enter your Roll Number.");
    return;
  }

  // Parse payload so we can extract token, original timestamp, etc.
  const qrData = processPayload(payload);
  if (!qrData) return;

  // UI Feedback
  btn.disabled = true;
  btn.innerText = "Processing...";
  statusDiv.innerText = "⏳ Recording attendance...";

  const cb = "att_" + Date.now();
  const url = `${API_URL}?type=mark_attendance` +
              `&student_id=${encodeURIComponent(rollNo)}` +
              `&session_id=${qrData.session_id}` +
              `&token=${qrData.token}` +
              `&timestamp=${qrData.timestamp}` + // Generation Time
              `&scan_time=${sTime}` +             // Scanned Time
              `&signature=${qrData.signature}` +
              `&device_id=${getDeviceId()}`;

  jsonpRequest(url, cb, (res) => {
    if (res.status === "success") {
      statusDiv.innerHTML = "<span style='color:green'>✅ Attendance Recorded Successfully!</span>";
      byId("formSection").classList.add("hidden");
    } else {
      btn.disabled = false;
      btn.innerText = "Retry Submission";
      let errorMsg = res.status.replace(/_/g, ' ').toUpperCase();
      statusDiv.innerHTML = `<span style='color:red'>❌ Error: ${errorMsg}</span>`;
    }
  });
}

/* ================= INITIALIZATION ================= */
window.onload = function() {
  const params = getUrlParams();
  const payload = params.get('p');
  const statusDiv = byId("status");
  
  if (payload) {
    // 1. Capture the EXACT moment the browser opened the QR link
    const scanTimestamp = Math.floor(Date.now() / 1000); 
    sessionStorage.setItem("pending_qr", payload);
    sessionStorage.setItem("scan_time", scanTimestamp);
    
    const qrData = processPayload(payload);
    if (!qrData) {
      statusDiv.innerHTML = "<span style='color:red'>❌ Invalid QR Data Format.</span>";
      return;
    }

    const genTime = parseInt(qrData.timestamp);
    
    // 2. PHYSICAL PRESENCE CHECK: Was the scan within 90 seconds of generation?
    if ((scanTimestamp - genTime) > 90) {
      byId("formSection").classList.add("hidden");
      statusDiv.innerHTML = "<span style='color:red'>❌ QR Stale. Please scan the live QR on the screen.</span>";
    }
  } else {
    // 3. Fallback: Page opened without a QR payload
    byId("formSection").classList.add("hidden");
    statusDiv.innerHTML = "<span style='color:#1e3a8a'>⚠️ No active scan detected. Please scan the classroom QR code.</span>";
  }
};
</script>
</body>
</html>
