<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Generator (Admin)</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f4f6f8;
}

.container {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

canvas {
  margin-top: 15px;
  image-rendering: pixelated;
}

#title {
  color: #2563eb;
  font-weight: bold;
  margin-bottom: 10px;
}

#zoomSlider {
  width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="title">Admin Login Required</h2>
  <canvas id="qr"></canvas>
  <input type="range" min="250" max="800" value="500" id="zoomSlider">
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzhBM6fFRXjkovVqWoCSQPO5mjwAcaPufzr7YJXBdqJMeoJpYOFBUwp55fvgYWSN4U/exec";
const PORTAL_URL = "https://pramodsoni.in/Attendance/";

// Timing
let QR_VALIDITY_MS = 60000;
const LEAD_TIME_MS = 3000;

// State
let ADMIN_PASS = "";
let qrTimeout = null;
let countdownInterval = null;
let lastQR = null;
let timeOffset = 0;

/* ================= JSONP ================= */
function jsonp(url, cb, success, fail) {
  const script = document.createElement("script");

  window[cb] = (data) => {
    delete window[cb];
    script.remove();
    success(data);
  };

  script.onerror = () => {
    delete window[cb];
    script.remove();
    if (fail) fail();
  };

  script.src = url + "&callback=" + cb;
  document.body.appendChild(script);
}

/* ================= ADMIN LOGIN ================= */
function init() {
  const cb = "admin_" + Date.now();

  jsonp(`${API_URL}?type=get_admin_pass`, cb, (data) => {

    if (data.status !== "success") {
      document.body.innerHTML = "Server Error";
      return;
    }

    ADMIN_PASS = data.pass;

    const input = prompt("Enter Admin Password:");

    if (input !== ADMIN_PASS) {
      document.body.innerHTML = "<h2>Unauthorized</h2>";
      return;
    }

    document.getElementById("title").innerText = "QR Active";
    fetchQR();

  });
}

/* ================= FETCH QR ================= */
function fetchQR() {

  const cb = "qr_" + Date.now();

  jsonp(`${API_URL}?type=generate_qr&session_id=CE101`, cb, (data) => {

    if (data.status !== "success") {
      qrTimeout = setTimeout(fetchQR, 2000);
      return;
    }

    const payload = data.qr_payload;

    const fullLink = `${PORTAL_URL}?p=${encodeURIComponent(payload)}`;

    // Sync timing
    QR_VALIDITY_MS = data.validity_sec * 1000;
    timeOffset = data.server_time - Date.now();

    renderQR(fullLink, payload);

    const parts = payload.split('|');

    lastQR = {
      timestamp: parseInt(parts[1]) * 1000,
      raw: payload
    };

    scheduleNext();
    startCountdown();

  }, () => qrTimeout = setTimeout(fetchQR, 3000));
}

/* ================= RENDER QR ================= */
function renderQR(link, payload) {

  const size = document.getElementById("zoomSlider").value;

  QRCode.toCanvas(document.getElementById("qr"), link, {
    width: parseInt(size),
    margin: 1,
    errorCorrectionLevel: 'H'
  });

}

/* ================= SCHEDULING ================= */
function scheduleNext() {

  const now = Date.now() + timeOffset;
  const expiry = lastQR.timestamp + QR_VALIDITY_MS;

  const delay = Math.max(1000, (expiry - now) - LEAD_TIME_MS);

  if (qrTimeout) clearTimeout(qrTimeout);
  qrTimeout = setTimeout(fetchQR, delay);
}

/* ================= COUNTDOWN ================= */
function startCountdown() {

  if (countdownInterval) clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {

    if (!lastQR) return;

    const now = Date.now() + timeOffset;
    const expiry = lastQR.timestamp + QR_VALIDITY_MS;

    let remaining = Math.max(0, Math.floor((expiry - now) / 1000));

    document.getElementById("title").innerText =
      `QR Active | ${remaining}s`;

  }, 1000);
}

/* ================= ZOOM ================= */
document.getElementById("zoomSlider").oninput = function() {
  if (!lastQR) return;

  const link = `${PORTAL_URL}?p=${encodeURIComponent(lastQR.raw)}`;
  renderQR(link, lastQR.raw);
};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", init);

</script>

</body>
</html>
