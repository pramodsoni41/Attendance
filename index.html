<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxcGsVky1zkFEUg57FQyYy5_gY0CJyGCcD1ZgCjW2oLy38FU0th8TCv4lr7lLBSw7M/exec";
const byId = (id) => document.getElementById(id);

/* ================= PROCESS QR ================= */
function processPayload(raw) {
  if (!raw) return null;
  const parts = raw.split('|');
  return {
    session_id: parts[0],
    timestamp: parts[1],
    token: parts[2],
    signature: parts[3]
  };
}

/* ================= JSONP ================= */
function jsonpRequest(url, cb, onSuccess) {
  const script = document.createElement("script");

  window[cb] = (data) => {
    script.remove();
    delete window[cb];
    onSuccess(data);
  };

  script.src = url + "&callback=" + cb;
  document.body.appendChild(script);
}

/* ================= AUTO ATTENDANCE ================= */
function autoSubmit() {

  const payload = localStorage.getItem("pending_qr");
  const sTime = localStorage.getItem("scan_time");
  const deviceId = localStorage.getItem("device_id");

  const statusDiv = byId("status");
  const formSection = byId("formSection");

  const qrData = processPayload(payload);

  statusDiv.innerText = "🔄 Checking device...";

  const cb = "auto_" + Date.now();

  const url = `${API_URL}?type=mark_attendance` +
              `&student_id=` + "" +   // EMPTY
              `&session_id=${qrData.session_id}` +
              `&token=${qrData.token}` +
              `&timestamp=${qrData.timestamp}` +
              `&scan_time=${sTime}` +
              `&signature=${qrData.signature}` +
              `&device_id=${deviceId}`;

  jsonpRequest(url, cb, (res) => {

    if (res.status === "success") {
      statusDiv.innerHTML = `✅ Attendance marked for <b>${res.name}</b>`;
      formSection.classList.add("hidden");
      localStorage.removeItem("pending_qr");
    }

    else if (res.status === "register_required") {
      formSection.classList.remove("hidden");
      statusDiv.innerText = "Enter Roll No (First Time Only)";
    }

    else {
      statusDiv.innerHTML = "❌ " + res.message;
    }
  });
}

/* ================= MANUAL SUBMIT ================= */
function handleSubmission() {

  const rollNo = byId("rollNo").value.trim();
  const payload = localStorage.getItem("pending_qr");
  const sTime = localStorage.getItem("scan_time");
  const deviceId = localStorage.getItem("device_id");

  const statusDiv = byId("status");
  const btn = byId("submitBtn");

  if (!rollNo) {
    alert("Enter Roll No");
    return;
  }

  const qrData = processPayload(payload);

  btn.disabled = true;
  statusDiv.innerText = "⏳ Registering device...";

  const cb = "reg_" + Date.now();

  const url = `${API_URL}?type=mark_attendance` +
              `&student_id=${encodeURIComponent(rollNo)}` +
              `&session_id=${qrData.session_id}` +
              `&token=${qrData.token}` +
              `&timestamp=${qrData.timestamp}` +
              `&scan_time=${sTime}` +
              `&signature=${qrData.signature}` +
              `&device_id=${deviceId}`;

  jsonpRequest(url, cb, (res) => {

    if (res.status === "success") {
      statusDiv.innerHTML = `✅ Attendance marked for <b>${res.name}</b>`;
      byId("formSection").classList.add("hidden");
      localStorage.removeItem("pending_qr");
    }

    else {
      btn.disabled = false;
      statusDiv.innerHTML = "❌ " + res.message;
    }
  });
}

/* ================= INIT ================= */
window.onload = function() {

  const params = new URLSearchParams(window.location.search);
  const payload = params.get("p");

  const statusDiv = byId("status");
  const formSection = byId("formSection");

  // Generate device id once
  if (!localStorage.getItem("device_id")) {
    localStorage.setItem("device_id", "DEV-" + Math.random().toString(36).substring(2,10));
  }

  // Save QR scan
  if (payload) {
    localStorage.setItem("pending_qr", payload);
    localStorage.setItem("scan_time", Math.floor(Date.now() / 1000));
  }

  const currentPayload = localStorage.getItem("pending_qr");

  if (!currentPayload) {
    formSection.classList.add("hidden");
    statusDiv.innerHTML = "⚠️ Scan QR first";
    return;
  }

  // Hide form initially
  formSection.classList.add("hidden");

  // Auto check device
  autoSubmit();
};

</script>
