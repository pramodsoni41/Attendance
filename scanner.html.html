<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h3>Scan QR to Mark Attendance</h3>
<div id="reader" style="width:300px;"></div>

<script>
const student_id = prompt("Enter your ID");
const scriptURL = "https://script.google.com/macros/s/AKfycby38xioEtsFPw8S1_Zoolj45baJx6QHMMBOqMf1OZC2NBcUtwMrIptDzv2U75_io0M/exec";

function onScanSuccess(decodedText) {
  const data = JSON.parse(decodedText);
  data.student_id = student_id;

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => alert(res.status));
}

new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 })
  .render(onScanSuccess);
</script>

</body>
</html>
