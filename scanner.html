<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f8;
}

#reader {
  width: 300px;
  margin: auto;
}

#status {
  margin-top: 15px;
  font-weight: bold;
  min-height: 24px;
}
</style>
</head>

<body>

<h3>Scan QR to Mark Attendance</h3>
<p>Camera will open automatically</p>

<div id="reader"></div>
<div id="status"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyJI2f3EoP77l3SeEf8PhGDYBH3Mszn8b2twFYPsVwLhC7ta4wtwlRlH15demmqsBQ/exec";

/* ================= LOGIN CHECK ================= */
const student = JSON.parse(localStorage.getItem("student"));

if (!student) {
  alert("Login first");
  window.location.href = "index.html";
}

/* ================= GLOBAL ================= */
let scanned = false;
let html5QrCode = new Html5Qrcode("reader");

/* ================= START CAMERA ================= */
Html5Qrcode.getCameras()
.then(devices => {

  console.log("CAMERAS:", devices);

  if (devices.length) {

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 200   // 🔥 smaller = better detection
      },
      onScanSuccess
    );

  } else {
    document.getElementById("status").innerText = "❌ No camera found";
  }

})
.catch(err => {
  console.error("CAMERA ERROR:", err);
  document.getElementById("status").innerText = "❌ Camera Error";
});

/* ================= ON SCAN ================= */
function onScanSuccess(decodedText) {

  console.log("SCANNED RAW:", decodedText);

  // 🔥 Debug alert (remove later)
  alert("QR Detected");

  if (scanned) return;
  scanned = true;

  let qrData;

  try {
    qrData = JSON.parse(decodedText);
  } catch (err) {
    console.log("PARSE ERROR:", err);
    document.getElementById("status").innerText = "❌ Invalid QR Format";
    scanned = false;
    return;
  }

  console.log("QR DATA:", qrData);

  document.getElementById("status").innerText = "Submitting...";

  /* ================= API CALL ================= */
  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      student_id: student.id,
      session_id: qrData.session_id,
      token: qrData.token,
      timestamp: qrData.timestamp,
      signature: qrData.signature
    })
  })
  .then(res => res.json())
  .then(res => {

    console.log("SERVER RESPONSE:", res);

    if (res.status === "success") {
      document.getElementById("status").innerText = "✅ Attendance Marked";
    } 
    else if (res.status === "expired") {
      document.getElementById("status").innerText = "⏱ QR Expired";
      scanned = false;
      return;
    }
    else if (res.status === "already_marked") {
      document.getElementById("status").innerText = "⚠ Already Marked";
    }
    else if (res.status === "invalid_qr") {
      document.getElementById("status").innerText = "🚫 Unauthorized QR";
      scanned = false;
      return;
    } 
    else {
      document.getElementById("status").innerText = "❌ Failed";
      scanned = false;
      return;
    }

    /* ================= STOP CAMERA ================= */
    if (html5QrCode) {
      html5QrCode.stop()
        .then(() => {
          console.log("Scanner stopped");
        })
        .catch(err => {
          console.log("Stop error:", err);
        });
    }

  })
  .catch(err => {
    console.error("FETCH ERROR:", err);
    document.getElementById("status").innerText = "❌ Network Error";
    scanned = false;
  });
}

</script>

</body>
</html>
