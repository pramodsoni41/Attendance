<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Generator (Admin)</title>

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f8;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    canvas {
      margin-top: 20px;
    }

    #title {
      color: #2563eb;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2 id="title">Admin Login Required</h2>
  <canvas id="qr" style="display:none;"></canvas>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx2vwSluUlRaYy4OFcj2fOGgCTMvJvo7jT-jGkeXRNOv9VfQd_FFKUA6xiimTUGOQ/exec";

let QR_VALIDITY_MS = 60000; // default fallback
const TOKEN_CACHE_SEC = 60;
let  REFRESH_BEFORE_MS = 55000;  // refresh 5 sec before expiry
let ADMIN_PASS = "";
let qrInterval = null;
let countdownInterval = null;
let lastQR = null;
let timeOffset = 0;

/* ================= JSONP ================= */
function jsonpRequest(url, callbackName, onSuccess, onError) {

  const script = document.createElement("script");

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();
    onSuccess(data);
  };

  script.src = url + "&callback=" + callbackName;

  script.onerror = function() {
    delete window[callbackName];
    script.remove();
    if (onError) onError();
  };

  document.body.appendChild(script);
}

/* ================= LOAD ADMIN ================= */
function loadAdminPass() {

  const cb = "admin_" + Date.now();
  const url = `${API_URL}?type=get_admin_pass`;

  jsonpRequest(url, cb, function(data) {

    if (data.status === "success") {
      ADMIN_PASS = data.pass;
      askPassword();
    } else {
      alert("❌ Cannot load admin config");
    }

  }, function() {
    alert("❌ Server error");
  });
}

/* ================= LOGIN ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {

    document.getElementById("qr").style.display = "block";
    startQR();

  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized</h2>";
  }
}


/* ================= FETCH QR (FIXED ADMIN SIDE) ================= */
function fetchQR() {
  const cb = "qr_" + Date.now();
  const url = `${API_URL}?type=generate_qr&session_id=CE101`;

  jsonpRequest(url, cb, function(data) {

    if (data.status !== "success") {
      console.warn("QR fetch failed");
      return;
    }

    // ✅ FIX 1: Use qr_payload instead of data.qr
    // The backend returns { status: "success", qr_payload: "..." }
    const payload = data.qr_payload; 
    
    // ✅ FIX 2: Define your portal URL
    const PORTAL_URL = "https://pramodsoni.in/Attendance/";
    
    // Construct the final link for the QR
    const fullLink = `${PORTAL_URL}?p=${encodeURIComponent(payload)}`;

    /* ✅ DYNAMIC VALIDITY */
    if (data.validity_sec) {
      QR_VALIDITY_MS = data.validity_sec * 1000;
      REFRESH_BEFORE_MS = Math.max(5000, QR_VALIDITY_MS - 5000);
    }

    /* ✅ TIME SYNC */
    timeOffset = data.server_time - Date.now();

    const qrCanvas = document.getElementById("qr");

    // Generate QR with the URL link
    QRCode.toCanvas(
      qrCanvas,
      fullLink,
      { width: 400, margin: 2, errorCorrectionLevel: 'M' }
    );

    // Update internal reference for the countdown
    // We split the payload to get the timestamp (second part of the string)
    const parts = payload.split('|');
    lastQR = {
      timestamp: parseInt(parts[1]) * 1000 // Convert seconds to ms
    };

    /* RESET TIMERS */
    clearInterval(countdownInterval);
    countdownInterval = setInterval(updateCountdown, 1000);

    clearInterval(qrInterval);
    qrInterval = setInterval(fetchQR, REFRESH_BEFORE_MS);

    updateCountdown();

  }, function() {
    console.warn("QR fetch error");
  });
}

/* ================= COUNTDOWN ================= */
function updateCountdown() {

  if (!lastQR) return;

  const now = Date.now() + timeOffset;

  const expiry = lastQR.timestamp + QR_VALIDITY_MS;
  const remaining = Math.floor((expiry - now) / 1000);

  if (remaining <= 0) {
    document.getElementById("title").innerText = "⛔ Refreshing QR...";
    return;
  }

  document.getElementById("title").innerText =
    "QR Active | Time Left: " + remaining + "s";
}

/* ================= LOOP ================= */
function startQR() {

  if (qrInterval) clearInterval(qrInterval);
  if (countdownInterval) clearInterval(countdownInterval);

  fetchQR();

  qrInterval = setInterval(fetchQR, REFRESH_BEFORE_MS);

  countdownInterval = setInterval(updateCountdown, 1000);
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", loadAdminPass);

</script>

</body>
</html>
