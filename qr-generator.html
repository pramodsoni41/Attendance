<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwKYuFF9AGWcDQYrEuBImWzKEY268yPxcdexwG3_sECca6zvdx3g31zooImNo3J3Lo/exec";

let ADMIN_PASS = "";

/* ================= LOAD ADMIN PASSWORD ================= */
function loadAdminPass() {

  const script = document.createElement("script");

  script.src = `${API_URL}?type=get_admin_pass&callback=setAdminPass`;

  script.onerror = () => {
    alert("❌ Cannot connect to server");
  };

  document.body.appendChild(script);
}

function setAdminPass(data) {

  if (data.status === "success") {
    ADMIN_PASS = data.pass;
    askPassword();
  } else {
    alert("Cannot load admin config");
  }
}

/* ================= ASK PASSWORD ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {

    document.getElementById("title").innerText = "Dynamic QR (Secure)";
    document.getElementById("qr").style.display = "block";

    startQR();

  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized Access</h2>";
  }
}

/* ================= GET QR FROM SERVER ================= */
function fetchQR() {

  const callbackName = "qr_" + Date.now();

  window[callbackName] = function(data) {

    delete window[callbackName];

    if (data.status !== "success") {
      alert("QR generation failed");
      return;
    }

    QRCode.toCanvas(
      document.getElementById('qr'),
      JSON.stringify(data.qr),
      { width: 600, margin: 2 }
    );
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?type=generate_qr&session_id=CE101&callback=${callbackName}`;
  document.body.appendChild(script);
}

/* ================= LOOP ================= */
function startQR() {
  fetchQR();
  setInterval(fetchQR, 15000);
}

/* ================= INIT ================= */
loadAdminPass();

</script>
