<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance</title>

<style>
body {
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4f6f8;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  width: 300px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="card">
  <h3>Attendance</h3>

  <div id="status">Loading...</div>

  <div id="formSection" class="hidden">
    <input id="rollNo" placeholder="Enter Roll No">
    <button onclick="submitRoll()">Submit</button>
  </div>
</div>

<script>

/* ================= CONFIG ================= */
const API = "https://script.google.com/macros/s/AKfycbyBaOjANYcuEiW07yzYCsANmHxgOJcv0XjalAN_IR9DOVwgYnNkUeh5h1Oj4h6Syvw/exec";

/* ================= HELPERS ================= */
function el(id){ return document.getElementById(id); }

/* ================= PARSE QR ================= */
function parseQR(raw){
  if(!raw) return null;
  const p = raw.split('|');
  if(p.length < 4) return null;

  return {
    session:p[0],
    time:p[1],
    token:p[2],
    sig:p[3]
  };
}

/* ================= JSONP ================= */
function call(url, cbName, done){
  const s = document.createElement("script");

  window[cbName] = function(res){
    delete window[cbName];
    s.remove();
    done(res);
  };

  s.onerror = function(){
    el("status").innerText = "Network Error";
  };

  s.src = url + "&callback=" + cbName;
  document.body.appendChild(s);
}

/* ================= AUTO ================= */
function auto(){

  const payload = localStorage.getItem("qr");
  const scanTime = localStorage.getItem("scan_time");
  const device = localStorage.getItem("device");

  if(!payload){
    el("status").innerText = "Scan QR first";
    return;
  }

  const q = parseQR(payload);

  if(!q){
    el("status").innerText = "Invalid QR";
    return;
  }

  el("status").innerText = "Checking...";

  const cb = "c" + Date.now();

  const url = API
    + "?type=mark_attendance"
    + "&student_id="
    + "&session_id=" + q.session
    + "&token=" + q.token
    + "&timestamp=" + q.time
    + "&scan_time=" + scanTime
    + "&signature=" + q.sig
    + "&device_id=" + device;

  call(url, cb, function(res){

    if(!res || !res.status){
      el("status").innerText = "Server Error";
      return;
    }

    if(res.status === "success"){
      el("status").innerHTML = "✅ Marked: " + res.name;
      el("formSection").classList.add("hidden");
      localStorage.removeItem("qr");
    }

    else if(res.status === "register_required"){
      el("formSection").classList.remove("hidden");
      el("status").innerText = "Enter Roll No";
    }

    else{
      el("status").innerText = res.message || res.status;
    }

  });
}

/* ================= REGISTER ================= */
function submitRoll(){

  const roll = el("rollNo").value.trim();

  if(!roll){
    alert("Enter Roll No");
    return;
  }

  const payload = localStorage.getItem("qr");
  const scanTime = localStorage.getItem("scan_time");
  const device = localStorage.getItem("device");

  const q = parseQR(payload);

  if(!q){
    el("status").innerText = "Invalid QR";
    return;
  }

  el("status").innerText = "Registering...";

  const cb = "r" + Date.now();

  const url = API
    + "?type=mark_attendance"
    + "&student_id=" + encodeURIComponent(roll)
    + "&session_id=" + q.session
    + "&token=" + q.token
    + "&timestamp=" + q.time
    + "&scan_time=" + scanTime
    + "&signature=" + q.sig
    + "&device_id=" + device;

  call(url, cb, function(res){

    if(res.status === "success"){
      el("status").innerHTML = "✅ Marked: " + res.name;
      el("formSection").classList.add("hidden");
      localStorage.removeItem("qr");
    }
    else{
      el("status").innerText = res.message || res.status;
    }

  });
}

/* ================= INIT ================= */
window.onload = function(){

  // device id
  if(!localStorage.getItem("device")){
    localStorage.setItem("device","DEV-"+Math.random().toString(36).slice(2,8));
  }

  // read QR
  const p = new URLSearchParams(location.search).get("p");

  if(p){
    localStorage.setItem("qr", p);
    localStorage.setItem("scan_time", Math.floor(Date.now()/1000));
  }

  auto();
};

</script>

</body>
</html>
