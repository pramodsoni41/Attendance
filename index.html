<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IIT BHU Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
  h2 { color: #1e3a8a; margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
  input:focus { border-color: #2563eb; outline: none; }
  button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1d4ed8; }
  #status { margin-top: 15px; font-weight: 600; min-height: 24px; }
  .hidden { display: none; }
</style>
</head>
<body>

  <h2>Attendance Portal</h2>
  
  <div id="formSection">
    <p id="instruction">Enter Roll Number to mark attendance</p>
    <input type="text" id="rollNo" placeholder="e.g. 21114001" autofocus>
    <button id="submitBtn" onclick="handleSubmission()">Submit Attendance</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwVy7xCze35FgP8rPlr-E0XFKbutd77fjXYJU39GLR-eYUIY3wfruKkM568T5N3bu4/exec";

/* ================= UTILS ================= */
function getUrlParams() {
  return new URLSearchParams(window.location.search);
}

function jsonpRequest(url, callbackName, onSuccess) {
  const script = document.createElement("script");
  window[callbackName] = (data) => {
    script.remove();
    delete window[callbackName];
    onSuccess(data);
  };
  script.src = `${url}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = "DEV-" + Math.random().toString(36).substring(2, 10) + Date.now();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ================= CORE LOGIC ================= */

// Initial Check
let scanTimestamp = null;

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('p');
    
    if (payload) {
        // Capture the EXACT moment the browser opened the QR link
        scanTimestamp = Math.floor(Date.now() / 1000); 
        sessionStorage.setItem("pending_qr", payload);
        sessionStorage.setItem("scan_time", scanTimestamp);

        const genTime = parseInt(qrData.timestamp);
        
        // PHYSICAL PRESENCE CHECK: Was the scan within 90 seconds of generation?
        if ((scanTimestamp - genTime) > 90) {
            document.getElementById("formSection").classList.add("hidden");

</script>
</body>
</html>
