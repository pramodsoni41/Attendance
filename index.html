<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Google Login -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}
.container{
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:350px;
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  text-align:center;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#007bff;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
button:hover{background:#0056b3;}
.logout{background:#dc3545;}
.secondary{background:#6c757d;}
.hidden{display:none;}
#reader{width:280px;margin:auto;}
#status{margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

  <!-- GOOGLE LOGIN -->
  <div id="loginSection">
    <h2>Login with Google</h2>

    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2>Welcome</h2>
    <p id="userInfo"></p>
    <button onclick="openScanner()">📷 Mark Attendance</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- SCANNER -->
  <div id="scannerSection" class="hidden">
    <h3>Scan QR</h3>
    <div id="reader"></div>
    <div id="status"></div>
    <button class="secondary" onclick="closeScanner()">⬅ Back</button>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw6QQ5_r7nCW-aSPX69uxxIIfo_cw_l-6hMmN1HvBJoPGyP4PFOtqGT79UviKGENd4/exec";

let html5QrCode = null;
let scanned = false;

/* ================= HELPERS ================= */
function byId(id){ return document.getElementById(id); }

/* ================= GOOGLE LOGIN ================= */
function handleCredentialResponse(response){

  const data = parseJwt(response.credential);

  // Restrict domain (IMPORTANT)
  if (!data.email.endsWith("@itbhu.ac.in")) {
    alert("Only Institute Email Allowed");
    return;
  }

  const student = {
    email: data.email,
    name: data.name
  };

  localStorage.setItem("student", JSON.stringify(student));

  showDashboard();
}

function parseJwt(token){
  return JSON.parse(atob(token.split('.')[1]));
}

/* ================= DASHBOARD ================= */
function showDashboard(){

  const student = JSON.parse(localStorage.getItem("student"));
  if (!student) return;

  byId("loginSection").classList.add("hidden");
  byId("dashboard").classList.remove("hidden");

  byId("userInfo").innerText =
    student.name + " (" + student.email + ")";
}

function logout(){
  localStorage.removeItem("student");
  location.reload();
}

/* ================= DEVICE ID ================= */
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if (!id){
    id = "DEV-" + Math.random().toString(36).substring(2) + Date.now();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ================= SCANNER ================= */
function openScanner(){
  byId("dashboard").classList.add("hidden");
  byId("scannerSection").classList.remove("hidden");
  startScanner();
}

function closeScanner(){

  if (html5QrCode){
    html5QrCode.stop().then(() => {
      byId("scannerSection").classList.add("hidden");
      byId("dashboard").classList.remove("hidden");
    });
  }
}

function startScanner(){

  scanned = false;
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices.length){
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    }
  });
}

/* ================= ATTENDANCE ================= */
function onScanSuccess(decodedText){

  if (scanned) return;
  scanned = true;

  let qrData;

  try{
    qrData = JSON.parse(decodedText);
  }catch{
    byId("status").innerText = "❌ Invalid QR";
    scanned = false;
    return;
  }

  const student = JSON.parse(localStorage.getItem("student"));
  const device_id = getDeviceId();

  byId("status").innerText = "Submitting...";

  const cb = "att_" + Date.now();

  window[cb] = function(res){

    delete window[cb];

    if (res.status === "success"){
      byId("status").innerText = "✅ Attendance Marked";
    }
    else if (res.status === "device_used"){
      byId("status").innerText = "🚫 Device already used";
      scanned = false;
      return;
    }
    else if (res.status === "already_marked"){
      byId("status").innerText = "⚠ Already marked";
    }
    else if (res.status === "expired"){
      byId("status").innerText = "⏱ QR expired";
      scanned = false;
      return;
    }
    else{
      byId("status").innerText = "❌ Failed";
      scanned = false;
      return;
    }

    setTimeout(() => closeScanner(), 1200);
  };

  const script = document.createElement("script");
  script.src =
    API_URL +
    "?type=mark_attendance" +
    "&email=" + encodeURIComponent(student.email) +
    "&session_id=" + qrData.session_id +
    "&token=" + qrData.token +
    "&timestamp=" + qrData.timestamp +
    "&signature=" + qrData.signature +
    "&device_id=" + device_id +
    "&callback=" + cb;

  document.body.appendChild(script);
}

/* ================= AUTO LOGIN ================= */
window.onload = showDashboard;

</script>

</body>
</html>
