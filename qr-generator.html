<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #title {
      margin-top: 10px;
      color: #2563eb;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>
<h3 id="title">Ready to Scan</h3>

<input id="studentId" placeholder="Enter Student ID">
<br>
<button onclick="startScanner()">Start Scanner</button>

<div id="reader"></div>
<div id="status"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwB0Xmci8Xd8DgLU8lkKduZwXak1WKuJrheg-hgT_rlMK31vmV83JFnuEEZkst-KNs/exec";

let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
  deviceId = "dev_" + Math.random().toString(36).substring(2, 10);
  localStorage.setItem("device_id", deviceId);
}

let scanner;
let scanLock = false;

/* ================= JSONP ================= */
function jsonp(url, callbackName, success) {
  const script = document.createElement("script");

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();
    success(data);
  };

  script.src = url + "&callback=" + callbackName;
  document.body.appendChild(script);
}

/* ================= START SCANNER ================= */
function startScanner() {

  const studentId = document.getElementById("studentId").value.trim();

  if (!studentId) {
    alert("Enter Student ID first");
    return;
  }

  if (scanner) return;

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    function(decodedText) {

      if (scanLock) return;
      scanLock = true;

      try {
        const qr = JSON.parse(decodedText);
        sendAttendance(studentId, qr);
      } catch (e) {
        document.getElementById("status").innerText = "❌ Invalid QR";
      }

      setTimeout(() => {
        scanLock = false;
      }, 2000);
    },
    function(error) {
      // silent
    }
  );
}

/* ================= SEND ATTENDANCE ================= */
function sendAttendance(studentId, qr) {

  const cb = "scan_" + Date.now();

  const url =
    `${API_URL}?type=mark_attendance` +
    `&student_id=${encodeURIComponent(studentId)}` +
    `&session_id=${encodeURIComponent(qr.session_id)}` +
    `&token=${encodeURIComponent(qr.token)}` +
    `&timestamp=${encodeURIComponent(qr.timestamp)}` +
    `&signature=${encodeURIComponent(qr.signature)}` +
    `&device_id=${encodeURIComponent(deviceId)}`;

  jsonp(url, cb, function(res) {

    let msg = "";

    switch (res.status) {
      case "success":
        msg = "✅ Attendance Marked";
        break;
      case "expired":
        msg = "⏱ QR Expired";
        break;
      case "expired_or_used":
        msg = "⚠️ QR Already Used";
        break;
      case "already_marked":
        msg = "ℹ️ Already Marked";
        break;
      case "device_used":
        msg = "📱 Device Already Used";
        break;
      case "invalid_qr":
        msg = "❌ Invalid QR";
        break;
      case "student_not_found":
        msg = "❌ Invalid Student ID";
        break;
      case "busy":
        msg = "⏳ Server Busy, Retry";
        break;
      default:
        msg = "⚠️ " + res.status;
    }

    document.getElementById("status").innerText = msg;

    // Countdown (based on QR timestamp)
    const remaining = Math.max(
      0,
      Math.floor((qr.timestamp + 25000 - Date.now()) / 1000)
    );

    document.getElementById("title").innerText =
      "QR Time Left: " + remaining + "s";
  });
}

</script>

</body>
</html>
