<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f8;
}

#reader {
  width: 300px;
  margin: auto;
}

#status {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<h3>Scan QR to Mark Attendance</h3>
<p>Allow camera access to continue</p>

<div id="reader"></div>
<div id="status"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyJI2f3EoP77l3SeEf8PhGDYBH3Mszn8b2twFYPsVwLhC7ta4wtwlRlH15demmqsBQ/exec";

// ✅ Get logged-in student
const student = JSON.parse(localStorage.getItem("student"));

if (!student) {
  alert("Login first");
  window.location.href = "index.html";
}

// 🚫 prevent multiple scans
let scanned = false;

const scanner = new Html5QrcodeScanner("reader", {
  fps: 10,
  qrbox: 250
});

function onScanSuccess(decodedText) {

  if (scanned) return;   // prevent repeat
  scanned = true;

  let qrData;

  try {
    qrData = JSON.parse(decodedText);
  } catch {
    document.getElementById("status").innerText = "❌ Invalid QR";
    scanned = false;
    return;
  }

  document.getElementById("status").innerText = "Submitting...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      student_id: student.id,
      session_id: qrData.session_id,
      token: qrData.token,
      timestamp: qrData.timestamp
    })
  })
  .then(res => res.json())
  .then(res => {

    if (res.status === "success") {
      document.getElementById("status").innerText = "✅ Attendance Marked";
    } 
    else if (res.status === "expired") {
      document.getElementById("status").innerText = "⏱ QR Expired";
      scanned = false;
    } 
    else if (res.status === "already_marked") {
      document.getElementById("status").innerText = "⚠ Already Marked";
    } 
    else {
      document.getElementById("status").innerText = "❌ Failed";
      scanned = false;
    }

    scanner.clear(); // stop camera

  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerText = "Network Error";
    scanned = false;
  });
}

// Start scanner
scanner.render(onScanSuccess);
</script>

</body>
</html>
