<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Dynamic QR (Secure)</h2>

<canvas id="qr"></canvas>

<script>

const API_URL = "YOUR_GS_URL";
let SECRET = "";

/* ================= LOAD SECRET ================= */
function loadSecret() {
  const script = document.createElement("script");
  script.src = `${API_URL}?type=get_secret_key&callback=setSecret`;
  document.body.appendChild(script);
}

function setSecret(data) {
  if (data.status === "success") {
    SECRET = data.secret;
    startQR();
  } else {
    alert("Cannot load secret");
  }
}

/* ================= HASH FUNCTION ================= */
async function sha256(str) {
  const buffer = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(str)
  );

  return Array.from(new Uint8Array(buffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

/* ================= QR GENERATION ================= */
async function generateQR() {

  const session_id = "CE101";
  const timestamp = Date.now();
  const token = Math.random().toString(36).substring(2,8);

  const raw = session_id + "|" + timestamp + "|" + SECRET;
  const signature = await sha256(raw);

  const data = {
    session_id,
    timestamp,
    token,
    signature   // ✅ CRITICAL
  };

  QRCode.toCanvas(
    document.getElementById('qr'),
    JSON.stringify(data),
    {
      width: 600,
      margin: 2
    }
  );
}

/* ================= LOOP ================= */
function startQR() {
  generateQR();
  setInterval(generateQR, 15000);
}

/* ================= INIT ================= */
loadSecret();

</script>

</body>
</html>
