<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Generator</title>

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  body {
    font-family: Arial;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f8;
  }

  .container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }

  canvas {
    margin-top: 20px;
  }
</style>

  
</head>

<body>

<div class="container">
  <h2 id="title">Admin Login Required</h2>
  <canvas id="qr" style="display:none;"></canvas>
</div>


<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwp5pk4yhw1-0TgmU7kvshqbT_itZsN9MFL8nSF_HmrxJtfxnfGyMU_zK7PTLaP55U/exec";

let ADMIN_PASS = "";
let qrInterval = null;

/* ================= JSONP ================= */
function jsonpRequest(url, callbackName, onSuccess, onError) {

  const script = document.createElement("script");

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();
    onSuccess(data);
  };

  script.src = url + "&callback=" + callbackName;

  script.onerror = function() {
    delete window[callbackName];
    script.remove();
    if (onError) onError();
  };

  document.body.appendChild(script);
}

/* ================= LOAD ADMIN ================= */
function loadAdminPass() {

  const cb = "admin_" + Date.now();
  const url = `${API_URL}?type=get_admin_pass`;

  jsonpRequest(url, cb, function(data) {

    if (data.status === "success") {
      ADMIN_PASS = data.pass;
      askPassword();
    } else {
      alert("❌ Cannot load admin config");
    }

  }, function() {
    alert("❌ Server error");
  });
}

/* ================= LOGIN ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {

    document.getElementById("title").innerText = "Dynamic QR (Active)";
    document.getElementById("qr").style.display = "block";

    startQR();

  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized</h2>";
  }
}

/* ================= FETCH QR ================= */
function fetchQR() {

  const cb = "qr_" + Date.now();
  const url = `${API_URL}?type=generate_qr&session_id=CE101`;

  jsonpRequest(url, cb, function(data) {

    if (data.status !== "success") {
      console.warn("QR failed");
      return;
    }

    const qrCanvas = document.getElementById("qr");

    QRCode.toCanvas(
      qrCanvas,
      JSON.stringify(data.qr),
      { width: 500, margin: 2 }
    );

  }, function() {
    console.warn("QR fetch error");
  });
}

/* ================= LOOP ================= */
function startQR() {

  if (qrInterval) clearInterval(qrInterval);

  fetchQR();

  qrInterval = setInterval(fetchQR, 15000);
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", loadAdminPass);

</script>

</body>
</html>
