<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Generator (Admin)</title>

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f8;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    canvas {
      margin-top: 20px;
    }

    #title {
      color: #2563eb;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2 id="title">Admin Login Required</h2>
  <canvas id="qr" style="display:none;"></canvas>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxlwNU2c0BK_VvRGzylKf4SPydHBOobwDGeLmuYCro9e6IwucxzDb-ZggzxRGMAMm8/exec";

if (type === "get_config") {
  return jsonp(callback, {
    status: "success",
    config: {
      qr_expiry: getConfigValue("qr_expiry"),
      qr_refresh: getConfigValue("qr_refresh")
    }
  });
}

let ADMIN_PASS = "";
let qrInterval = null;
let countdownInterval = null;
let lastQR = null;
let timeOffset = 0;

/* ================= JSONP ================= */
function jsonpRequest(url, callbackName, onSuccess, onError) {

  const script = document.createElement("script");

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();
    onSuccess(data);
  };

  script.src = url + "&callback=" + callbackName;

  script.onerror = function() {
    delete window[callbackName];
    script.remove();
    if (onError) onError();
  };

  document.body.appendChild(script);
}

/* ================= LOAD ADMIN ================= */
function loadAdminPass() {

  const cb = "admin_" + Date.now();
  const url = `${API_URL}?type=get_admin_pass`;

  jsonpRequest(url, cb, function(data) {

    if (data.status === "success") {
      ADMIN_PASS = data.pass;
      askPassword();
    } else {
      alert("❌ Cannot load admin config");
    }

  }, function() {
    alert("❌ Server error");
  });
}

/* ================= LOGIN ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {

    document.getElementById("qr").style.display = "block";
    startQR();

  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized</h2>";
  }
}

/* ================= FETCH QR ================= */
function fetchQR() {

  const cb = "qr_" + Date.now();
  const url = `${API_URL}?type=generate_qr`;

  jsonpRequest(url, cb, function(data) {

    if (data.status !== "success") {
      console.warn("QR fetch failed");
      return;
    }

    lastQR = data.qr;

    /* ===== TIME SYNC (IMPORTANT) ===== */
    const serverNow = lastQR.timestamp;
    const clientNow = Date.now();
    timeOffset = serverNow - clientNow;

    const qrCanvas = document.getElementById("qr");

    QRCode.toCanvas(
      qrCanvas,
      JSON.stringify(lastQR),
      { width: 400, margin: 2 }
    );

    updateCountdown();

  }, function() {
    console.warn("QR fetch error");
  });
}

/* ================= COUNTDOWN ================= */
function updateCountdown() {

  if (!lastQR) return;

  const now = Date.now() + timeOffset;

  const remaining = Math.max(
    0,
    Math.floor((lastQR.timestamp + QR_VALIDITY_MS - now) / 1000)
  );

  document.getElementById("title").innerText =
    "QR Active | Time Left: " + remaining + "s";
}

/* ================= LOOP ================= */
function startQR() {

  if (qrInterval) clearInterval(qrInterval);
  if (countdownInterval) clearInterval(countdownInterval);

  fetchQR();

  // refresh QR slightly before expiry
  qrInterval = setInterval(fetchQR, REFRESH_BEFORE_MS);

  // update countdown every second
  countdownInterval = setInterval(updateCountdown, 1000);
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", loadAdminPass);

</script>

</body>
</html>
