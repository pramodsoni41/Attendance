<script>
// Replace with your latest Deployment Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbwVy7xCze35FgP8rPlr-E0XFKbutd77fjXYJU39GLR-eYUIY3wfruKkM568T5N3bu4/exec";

/* ================= UTILS ================= */
function byId(id) { return document.getElementById(id); }

function getUrlParams() { return new URLSearchParams(window.location.search); }

function processPayload(raw) {
  if (!raw) return null;
  const parts = raw.split('|');
  return parts.length >= 4 ? {
    session_id: parts[0],
    timestamp: parts[1],
    token: parts[2],
    signature: parts[3]
  } : null;
}

function jsonpRequest(url, callbackName, onSuccess) {
  const script = document.createElement("script");
  // Safety timeout if server doesn't respond
  const timeout = setTimeout(() => {
    byId("status").innerHTML = "<span style='color:red'>❌ Server Timeout. Check internet.</span>";
    byId("submitBtn").disabled = false;
  }, 10000);

  window[callbackName] = (data) => {
    clearTimeout(timeout);
    script.remove();
    delete window[callbackName];
    onSuccess(data);
  };
  script.src = `${url}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = "DEV-" + Math.random().toString(36).substring(2, 10) + Date.now();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ================= CORE LOGIC ================= */
function handleSubmission() {
  const rollNo = byId("rollNo").value.trim();
  const payload = localStorage.getItem("pending_qr");
  const sTime = localStorage.getItem("scan_time");
  const statusDiv = byId("status");
  const btn = byId("submitBtn");

  if (!payload || !sTime) {
    statusDiv.innerHTML = "<span style='color:red'>❌ Error: No valid scan found. Re-scan the QR.</span>";
    return;
  }

  if (!rollNo) {
    alert("Please enter your Roll Number.");
    return;
  }

  const qrData = processPayload(payload);
  if (!qrData) return;

  btn.disabled = true;
  btn.innerText = "Processing...";
  statusDiv.innerText = "⏳ Recording attendance...";

  const cb = "att_" + Date.now();
  
  // ✅ FIXED: Removed comments from inside the URL string
  const url = `${API_URL}?type=mark_attendance` +
              `&student_id=${encodeURIComponent(rollNo)}` +
              `&session_id=${qrData.session_id}` +
              `&token=${qrData.token}` +
              `&timestamp=${qrData.timestamp}` + 
              `&scan_time=${sTime}` +             
              `&signature=${qrData.signature}` +
              `&device_id=${getDeviceId()}`;

  jsonpRequest(url, cb, (res) => {
    if (res.status === "success") {
      statusDiv.innerHTML = "<span style='color:green'>✅ Attendance Recorded Successfully!</span>";
      byId("formSection").classList.add("hidden");
      // Clear data after success
      localStorage.removeItem("pending_qr");
    } else {
      btn.disabled = false;
      btn.innerText = "Retry Submission";
      let errorMsg = res.status.replace(/_/g, ' ').toUpperCase();
      statusDiv.innerHTML = `<span style='color:red'>❌ Error: ${errorMsg}</span>`;
    }
  });
}

/* ================= INITIALIZATION ================= */
window.onload = function() {
  const params = getUrlParams();
  const payload = params.get('p');
  const statusDiv = byId("status");
  
  if (payload) {
    const scanTimestamp = Math.floor(Date.now() / 1000); 
    localStorage.setItem("pending_qr", payload);
    localStorage.setItem("scan_time", scanTimestamp);
    
    const qrData = processPayload(payload);
    if (!qrData) {
      statusDiv.innerHTML = "<span style='color:red'>❌ Invalid QR Format.</span>";
      return;
    }

    const genTime = parseInt(qrData.timestamp);
    if ((scanTimestamp - genTime) > 90) {
      byId("formSection").classList.add("hidden");
      statusDiv.innerHTML = "<span style='color:red'>❌ QR Stale. Scan the live QR.</span>";
    }
  } else {
    // If no new scan, check if there's a recent valid one in memory
    const existingPayload = localStorage.getItem("pending_qr");
    if (!existingPayload) {
      byId("formSection").classList.add("hidden");
      statusDiv.innerHTML = "<span style='color:#1e3a8a'>⚠️ Scan the classroom QR to begin.</span>";
    }
  }
};
</script>
