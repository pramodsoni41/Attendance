<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx5N5qsZB8-bJkxohprYKgH2RSzuvlJ-7CfNYq_KqVDO3PvR07n27SX7Rn0sysrlLA/exec";

let ADMIN_PASS = "";
let qrInterval = null;

/* ================= SAFE JSONP ================= */
function jsonpRequest(url, callbackName, onSuccess, onError) {

  window[callbackName] = function(data) {
    delete window[callbackName];
    script.remove();
    onSuccess(data);
  };

  const script = document.createElement("script");
  script.src = url + "&callback=" + callbackName;

  script.onerror = function() {
    delete window[callbackName];
    script.remove();
    if (onError) onError();
  };

  document.body.appendChild(script);
}

/* ================= LOAD ADMIN PASSWORD ================= */
function loadAdminPass() {

  const cb = "admin_" + Date.now();

  const url = `${API_URL}?type=get_admin_pass`;

  jsonpRequest(url, cb, function(data) {

    if (data.status === "success") {
      ADMIN_PASS = data.pass;
      askPassword();
    } else {
      alert("❌ Cannot load admin config");
    }

  }, function() {
    alert("❌ Server connection failed");
  });
}

/* ================= ASK PASSWORD ================= */
function askPassword() {

  const input = prompt("Enter Admin Password:");

  if (input === ADMIN_PASS) {

    const titleEl = document.getElementById("title");
    const qrEl = document.getElementById("qr");

    if (!titleEl || !qrEl) {
      alert("❌ UI elements missing");
      return;
    }

    titleEl.innerText = "Dynamic QR (Secure)";
    qrEl.style.display = "block";

    startQR();

  } else {
    alert("❌ Access Denied");
    document.body.innerHTML = "<h2>Unauthorized Access</h2>";
  }
}

/* ================= FETCH QR ================= */
function fetchQR() {

  const cb = "qr_" + Date.now();

  const url = `${API_URL}?type=generate_qr&session_id=CE101`;

  jsonpRequest(url, cb, function(data) {

    if (data.status !== "success") {
      console.warn("QR generation failed");
      return;
    }

    const qrCanvas = document.getElementById("qr");

    if (!qrCanvas) return;

    QRCode.toCanvas(
      qrCanvas,
      JSON.stringify(data.qr),
      { width: 600, margin: 2 }
    );

  }, function() {
    console.warn("QR fetch failed");
  });
}

/* ================= LOOP ================= */
function startQR() {

  fetchQR();

  if (qrInterval) clearInterval(qrInterval);

  qrInterval = setInterval(fetchQR, 15000);
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", function () {
  loadAdminPass();
});

</script>
