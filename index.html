<script>

/* ================= CONFIG ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbxcGsVky1zkFEUg57FQyYy5_gY0CJyGCcD1ZgCjW2oLy38FU0th8TCv4lr7lLBSw7M/exec";

/* ================= SAFE DOM ================= */
function byId(id) {
  const el = document.getElementById(id);
  if (!el) console.error("Missing element:", id);
  return el;
}

/* ================= ERROR DEBUG ================= */
window.onerror = function(err) {
  document.body.innerHTML = "❌ JS ERROR: " + err;
};

/* ================= PARSE QR ================= */
function parseQR(raw) {
  if (!raw) return null;

  const parts = raw.split('|');

  if (parts.length < 4) return null;

  return {
    session_id: parts[0],
    timestamp: parts[1],
    token: parts[2],
    signature: parts[3]
  };
}

/* ================= JSONP ================= */
function callAPI(url, cb, success) {

  const script = document.createElement("script");

  window[cb] = function(res) {
    delete window[cb];
    script.remove();
    success(res);
  };

  script.onerror = function() {
    byId("status").innerText = "❌ Network error";
  };

  script.src = url + "&callback=" + cb;
  document.body.appendChild(script);
}

/* ================= AUTO ATTEND ================= */
function autoAttend() {

  const payload = localStorage.getItem("pending_qr");
  const scanTime = localStorage.getItem("scan_time");
  const deviceId = localStorage.getItem("device_id");

  const status = byId("status");
  const form = byId("formSection");

  if (!payload) {
    status.innerText = "⚠️ Scan QR first";
    return;
  }

  const qr = parseQR(payload);

  if (!qr) {
    status.innerText = "❌ Invalid QR";
    return;
  }

  status.innerText = "🔄 Checking device...";

  const cb = "auto_" + Date.now();

  const url = `${API_URL}?type=mark_attendance`
    + `&student_id=`
    + `&session_id=${qr.session_id}`
    + `&token=${qr.token}`
    + `&timestamp=${qr.timestamp}`
    + `&scan_time=${scanTime}`
    + `&signature=${qr.signature}`
    + `&device_id=${deviceId}`;

  callAPI(url, cb, function(res) {

    if (res.status === "success") {
      status.innerHTML = `✅ Attendance marked for <b>${res.name}</b>`;
      form.classList.add("hidden");
      localStorage.removeItem("pending_qr");
    }

    else if (res.status === "register_required") {
      form.classList.remove("hidden");
      status.innerText = "Enter Roll No (First Time Only)";
    }

    else {
      status.innerHTML = "❌ " + (res.message || res.status);
    }
  });
}

/* ================= REGISTER ================= */
function submitRoll() {

  const roll = byId("rollNo").value.trim();
  const payload = localStorage.getItem("pending_qr");
  const scanTime = localStorage.getItem("scan_time");
  const deviceId = localStorage.getItem("device_id");

  const status = byId("status");
  const btn = byId("submitBtn");

  if (!roll) {
    alert("Enter Roll No");
    return;
  }

  const qr = parseQR(payload);

  if (!qr) {
    status.innerText = "❌ Invalid QR";
    return;
  }

  btn.disabled = true;
  status.innerText = "⏳ Registering...";

  const cb = "reg_" + Date.now();

  const url = `${API_URL}?type=mark_attendance`
    + `&student_id=${encodeURIComponent(roll)}`
    + `&session_id=${qr.session_id}`
    + `&token=${qr.token}`
    + `&timestamp=${qr.timestamp}`
    + `&scan_time=${scanTime}`
    + `&signature=${qr.signature}`
    + `&device_id=${deviceId}`;

  callAPI(url, cb, function(res) {

    if (res.status === "success") {
      status.innerHTML = `✅ Attendance marked for <b>${res.name}</b>`;
      byId("formSection").classList.add("hidden");
      localStorage.removeItem("pending_qr");
    }

    else {
      btn.disabled = false;
      status.innerHTML = "❌ " + (res.message || res.status);
    }
  });
}

/* ================= INIT ================= */
window.onload = function() {

  const status = byId("status");
  const form = byId("formSection");

  // Create device ID once
  if (!localStorage.getItem("device_id")) {
    localStorage.setItem("device_id", "DEV-" + Math.random().toString(36).substring(2,10));
  }

  // Get QR payload from URL
  const params = new URLSearchParams(window.location.search);
  const payload = params.get("p");

  if (payload) {
    localStorage.setItem("pending_qr", payload);
    localStorage.setItem("scan_time", Math.floor(Date.now() / 1000));
  }

  const saved = localStorage.getItem("pending_qr");

  if (!saved) {
    form.classList.add("hidden");
    status.innerText = "⚠️ Please scan QR";
    return;
  }

  // Hide form initially
  form.classList.add("hidden");

  // Start auto flow
  autoAttend();
};

</script>
