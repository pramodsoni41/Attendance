<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scan Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f8;
}

#reader {
  width: 300px;
  margin: auto;
}

#status {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<h3>Scan QR to Mark Attendance</h3>
<p>Camera will open automatically</p>

<div id="reader"></div>
<div id="status"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyJI2f3EoP77l3SeEf8PhGDYBH3Mszn8b2twFYPsVwLhC7ta4wtwlRlH15demmqsBQ/exec";

// ✅ Get logged-in student
const student = JSON.parse(localStorage.getItem("student"));

if (!student) {
  alert("Login first");
  window.location.href = "index.html";
}

let scanned = false;
let html5QrCode = new Html5Qrcode("reader");

/* =========================
   START CAMERA
========================= */
Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  } else {
    alert("No camera found");
  }
});

/* =========================
   ON SCAN
========================= */
function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  let qrData;

  try {
    qrData = JSON.parse(decodedText);
  } catch {
    document.getElementById("status").innerText = "❌ Invalid QR";
    scanned = false;
    return;
  }

  document.getElementById("status").innerText = "Submitting...";

  // ✅ JSONP request (NO CORS issue)
  const url = `${API_URL}?type=attendance`
    + `&student_id=${encodeURIComponent(student.id)}`
    + `&session_id=${encodeURIComponent(qrData.session_id)}`
    + `&token=${encodeURIComponent(qrData.token)}`
    + `&timestamp=${encodeURIComponent(qrData.timestamp)}`
    + `&callback=handleAttendance`;

  const script = document.createElement("script");
  script.src = url;

  script.onerror = () => {
    document.getElementById("status").innerText = "❌ Network Error";
    scanned = false;
  };

  document.body.appendChild(script);
}

/* =========================
   HANDLE RESPONSE
========================= */
function handleAttendance(res) {

  if (res.status === "success") {
    document.getElementById("status").innerText = "✅ Attendance Marked";
  } 
  else if (res.status === "expired") {
    document.getElementById("status").innerText = "⏱ QR Expired";
    scanned = false;
  } 
  else if (res.status === "already_marked") {
    document.getElementById("status").innerText = "⚠ Already Marked";
  } 
  else {
    document.getElementById("status").innerText = "❌ Failed";
    scanned = false;
  }

  html5QrCode.stop().catch(()=>{});
}
</script>

</body>
</html>
