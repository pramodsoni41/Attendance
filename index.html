<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IIT BHU Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
  h2 { color: #1e3a8a; margin-bottom: 20px; }
  input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
  input:focus { border-color: #2563eb; outline: none; }
  button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #1d4ed8; }
  #status { margin-top: 15px; font-weight: 600; min-height: 24px; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <h2>Attendance Portal</h2>
  
  <div id="formSection">
    <p id="instruction">Enter Roll Number to mark attendance</p>
    <input type="text" id="rollNo" placeholder="e.g. 21114001" autofocus>
    <button id="submitBtn" onclick="handleSubmission()">Submit Attendance</button>
  </div>

  <div id="status"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyNJF-yE_YeEec9w6_bpcfhHQAPvoMYKCDNOAEYYH8o_CQRhwt6pY3oTRzz2GNahIA/exec";

/* ================= UTILS ================= */
function getUrlParams() {
  return new URLSearchParams(window.location.search);
}

function jsonpRequest(url, callbackName, onSuccess) {
  const script = document.createElement("script");
  window[callbackName] = (data) => {
    script.remove();
    delete window[callbackName];
    onSuccess(data);
  };
  script.src = `${url}&callback=${callbackName}`;
  document.body.appendChild(script);
}

function getDeviceId() {
  let id = localStorage.getItem("device_id");
  if (!id) {
    id = "DEV-" + Math.random().toString(36).substring(2, 10) + Date.now();
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* ================= CORE LOGIC ================= */
function handleSubmission() {
  const params = getUrlParams();
  const payload = params.get('p');
  const rollNo = document.getElementById("rollNo").value.trim();
  const statusDiv = document.getElementById("status");
  const btn = document.getElementById("submitBtn");

  if (!payload) {
    statusDiv.innerHTML = "<span style='color:red'>❌ No active QR scan detected. Please scan the classroom QR.</span>";
    return;
  }

  if (!rollNo) {
    alert("Please enter your Roll Number.");
    return;
  }

  // Disable UI
  btn.disabled = true;
  btn.innerText = "Processing...";
  statusDiv.innerText = "⏳ Communicating with server...";

  // Parse Payload (session|ts|token|sig)
  const parts = payload.split('|');
  const qrData = {
    session_id: parts[0],
    timestamp: parts[1],
    token: parts[2],
    signature: parts[3]
  };

  const cb = "att_" + Date.now();
  const url = `${API_URL}?type=mark_attendance` +
              `&student_id=${encodeURIComponent(rollNo)}` +
              `&session_id=${qrData.session_id}` +
              `&token=${qrData.token}` +
              `&timestamp=${qrData.timestamp}` +
              `&signature=${qrData.signature}` +
              `&device_id=${getDeviceId()}`;

  jsonpRequest(url, cb, (res) => {
    if (res.status === "success") {
      statusDiv.innerHTML = "<span style='color:green'>✅ Attendance Recorded Successfully!</span>";
      document.getElementById("formSection").classList.add("hidden");
    } else {
      btn.disabled = false;
      btn.innerText = "Retry Submission";
      let errorMsg = res.status.replace(/_/g, ' ').toUpperCase();
      statusDiv.innerHTML = `<span style='color:red'>❌ Error: ${errorMsg}</span>`;
    }
  });
}

// Initial Check
window.onload = () => {
  const params = getUrlParams();
  if (!params.get('p')) {
    document.getElementById("instruction").innerText = "⚠️ Please scan the QR code from the projector screen.";
    document.getElementById("rollNo").style.display = "none";
    document.getElementById("submitBtn").style.display = "none";
  }
};
</script>
</body>
</html>
